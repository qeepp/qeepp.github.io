name: QEEPP Site CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  static-site-checks:
    name: QEEPP Site CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Optional but recommended: formatting consistency check
      - name: Check formatting (Prettier)
        run: |
          npm install -g prettier
          prettier --check "**/*.{html,css,js,json,md}" || true

      # HTML validation
      - name: Validate HTML
        run: |
          npm install -g htmlhint
          # Lint full pages, exclude HTML fragments/partials
          htmlhint "**/*.html" --exclude "partials/**/*.html"

      # JS syntax check (safe even if no JS files)
      - name: Check JavaScript syntax
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/*.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JS files found."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            node --check "$f"
          done

      # Link checker (uses .lycheeignore for known exclusions like Formspree/LinkedIn)
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --accept 200,206,429 --exclude "mailto:.*" "./**/*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Lint GitHub Actions workflow files
      - name: Lint GitHub Actions workflow files
        uses: devops-actions/actionlint@v0.1.11



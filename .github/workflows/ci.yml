name: QEEPP Site CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  static-site-checks:
    name: QEEPP Site CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      # Optional formatting consistency check, non-blocking
      - name: Check formatting (Prettier)
        shell: bash
        run: |
          set -euo pipefail
          npm install -g prettier
          prettier --check "**/*.{html,css,js,json,md,yml,yaml}" || true

      # HTML validation, excluding partial fragments
      - name: Validate HTML
        shell: bash
        run: |
          set -euo pipefail
          npm install -g htmlhint

          echo "Collecting HTML files (excluding ./partials/)..."
          mapfile -t files < <(find . -type f -name "*.html" ! -path "./partials/*" -print | sort)

          echo "HTML files found: ${#files[@]}"
          if [ ${#files[@]} -eq 0 ]; then
            echo "No HTML files found."
            exit 0
          fi

          htmlhint "${files[@]}" || {
            echo "htmlhint failed. Re-running one file at a time to pinpoint the offender..."
            for f in "${files[@]}"; do
              echo "---- $f ----"
              htmlhint "$f" || exit 1
            done
          }

      # JS syntax check
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(**/*.js)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No JS files found."
            exit 0
          fi

          for f in "${files[@]}"; do
            echo "Checking $f"
            node --check "$f"
          done

      # Lint GitHub Actions workflow files
      - name: Lint GitHub Actions workflow files
        uses: devops-actions/actionlint@v0.1.11

      # Link checker
      # --root-dir . helps lychee resolve root-relative links in local HTML files
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --root-dir .
            --accept 200,206,429
            --exclude-mail
            "./*.html"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

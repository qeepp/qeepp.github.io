name: QEEPP Site CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  static-site-checks:
    name: QEEPP Site CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check formatting (Prettier)
        run: |
          npm install -g prettier
          prettier --check "**/*.{html,css,js,json,md}" || true

      - name: Validate HTML
        shell: bash
        run: |
          set -euo pipefail
          npm install -g htmlhint

          mapfile -t files < <(find . -type f -name "*.html" ! -path "./partials/*" -print)
          echo "HTML files found: ${#files[@]}"

          if [ ${#files[@]} -eq 0 ]; then
            echo "No HTML files found."
            exit 0
          fi

          htmlhint "${files[@]}"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/*.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JS files found."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Check links
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t files < <(find . -type f -name "*.html" ! -path "./partials/*" -print)
          echo "Pages to scan: ${#files[@]}"

          if [ ${#files[@]} -eq 0 ]; then
            echo "No HTML files found."
            exit 0
          fi

          lychee --verbose --no-progress --accept 200,206,429 --exclude "mailto:.*" "${files[@]}"

      - name: Lint GitHub Actions workflow files
        uses: devops-actions/actionlint@v0.1.11
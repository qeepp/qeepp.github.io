name: Send Cloudflare Preview Link to Slack

on:
  check_run:
    types: [completed] # Run when a check finishes

permissions:
  checks: read
  contents: read

jobs:
  notify:
    if: ${{ startsWith(github.event.check_run.name, 'Cloudflare Pages') && github.event.check_run.conclusion == 'success' && github.event.check_run.pull_requests && github.event.check_run.pull_requests[0] }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip if only non-site files changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          sha="${{ github.event.check_run.head_sha }}"
          repo="${{ github.repository }}"

          files=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/commits/$sha" \
            | jq -r '.files[].filename')

          echo "$files"

          # Skip Slack notifications when ONLY these paths/files change:
          # - .github/ (workflows, CI)
          # - README.md / LICENSE*
          # - .gitignore
          if echo "$files" | grep -Eqv '^(\.github/|README.*$|LICENSE.*$|\.gitignore$)'; then
            echo "Site-relevant changes detected. Continue."
          else
            echo "Only non-site files changed (.github/README/LICENSE/etc). Skipping Slack notification."
            exit 0
          fi

      - name: Build message
        id: msg
        run: |
          SUMMARY="${{ github.event.check_run.output.summary }}"
          TEXT="${{ github.event.check_run.output.text }}"
          DETAILS="${{ github.event.check_run.details_url }}"

          URL=$(printf "%s\n%s\n" "$SUMMARY" "$TEXT" | grep -Eo 'https://[a-zA-Z0-9.-]+\.pages\.dev[^ )\n]*' | head -n 1 || true)

          if [ -z "$URL" ]; then
            URL="$DETAILS"
          fi

          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.check_run.head_sha }}
          URL: ${{ steps.msg.outputs.preview_url }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "✅ Cloudflare Pages preview ready\nRepo: ${REPO}\nCommit: ${SHA}\nPreview: ${URL}"
          }
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$SLACK_WEBHOOK_URL"

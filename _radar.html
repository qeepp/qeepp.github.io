<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QEEPP Radar Test</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="stylesheet" href="assets/css/qeepp-charts.css" />

  <style>
    :root {
      --text: #e8eef7;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0b1220;
      color: #e8eef7;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 28px 18px 40px;
    }

    .test-wrap {
      max-width: 980px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <main class="test-wrap">
    <div id="caseRadar"></div>
  </main>

  <script src="assets/js/qeepp-charts.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      QEEPPCharts.radar("caseRadar", {
        current: {
          quality: 2.6,
          effectiveness: 3.4,
          efficiency: 3.2,
          performance: 3.0,
          productivity: 3.4
        },
      });
    });
  </script>
</body>
</html>
